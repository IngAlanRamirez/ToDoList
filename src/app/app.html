<header
  class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-50 px-4 min-h-14"
>
  <div class="flex-1">
    <span
      class="text-lg font-semibold text-base-content"
      data-testid="app-title"
      >{{ title() }}</span
    >
  </div>
  <div class="flex-none flex items-center">
    <label
      class="flex cursor-pointer gap-2 items-center"
      [attr.aria-label]="
        theme.isDark() ? 'Activar tema claro' : 'Activar tema oscuro'
      "
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="shrink-0 text-base-content/80"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="5" />
        <path
          d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"
        />
      </svg>
      <input
        type="checkbox"
        value="dark"
        class="toggle toggle-sm theme-controller"
        data-testid="theme-toggle"
        [checked]="theme.isDark()"
        (change)="theme.toggle()"
      />
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="shrink-0 text-base-content/80"
        aria-hidden="true"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </label>
  </div>
</header>

<main class="min-h-[calc(100dvh-3.5rem)] bg-base-100">
  <div class="mx-auto max-w-4xl px-4 py-8 md:px-6 md:py-10">
    <router-outlet />
  </div>
</main>
